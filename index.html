<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Tumble Trainer — offline-first tumbling & strength workout tracker">
  <link rel="manifest" href="manifest.webmanifest">
  <!-- iOS ignores the manifest for home-screen installs; these are its equivalents. -->
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tumble">
  <title>Tumble Trainer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- App shell: header, current view, and the (generic) tab bar are all rendered by app.js -->
  <div id="app">
    <header id="app-header"></header>
    <main id="view"></main>
    <nav id="tabs"></nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
